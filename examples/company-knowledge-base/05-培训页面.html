<!doctype html>
<html lang="zh-CN">

    <title>知识库导入培训</title>
  </head>
  <body>
    <h1>知识库导入培训</h1>
    <h2>第一步：整理源文件</h2>
    <p>删除重复文件，确认文档版本，按部门或业务主题建立目录。</p>
    <h2>第二步：运行转换</h2>
    <p>选择合适的工作流模板，运行 DocPipe 转换任务，并保存输出目录。</p>
    <h2>第三步：复核结果</h2>
    <p>重点查看复核清单中的文件，确认表格、标题和关键条款没有明显丢失。</p>
    <h2>第四步：导入知识库</h2>
    <p>选择目标平台对应的导出文件，先做小范围问答测试，再扩大导入范围。</p>
  </body>
</html>
