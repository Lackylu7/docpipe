name: Bug report
description: Report something that is broken or confusing
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the commands, files, and settings used.
      placeholder: |
        1. Run ...
        2. Upload ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DocPipe version or commit
      placeholder: "v0.1.0 or commit SHA"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, browser, parser route"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: text

